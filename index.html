<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAce Ultimate Slot - Bet Limit Fixed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: #000; font-family: 'Arial', sans-serif; overflow: hidden; 
        }

        /* ক্যাসিনো ব্যাকগ্রাউন্ড */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://gstatic.com');
            background-size: cover; background-position: center; filter: brightness(0.4) blur(4px); z-index: -1;
        }

        .game-container { 
            width: 370px; background: rgba(15, 15, 15, 0.98); 
            border: 4px solid #b8860b; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
        }

        .slot-machine { 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 5px; padding: 12px; background: #000; 
        }
        .reel { 
            display: flex; flex-direction: column; gap: 5px; 
            overflow: hidden; height: 295px; 
        }

        .slot-cell { 
            min-height: 70px; aspect-ratio: 1/1; 
            background: linear-gradient(145deg, #232a2f, #050505); 
            border: 1px solid #333; border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; 
            color: #ffd700; font-weight: bold; font-size: 1.5rem; 
        }

        .controls { padding: 15px; background: #111; border-top: 2px solid #b8860b; }
        
        .status-row { 
            display: flex; justify-content: space-between; color: #ffd700; 
            font-size: 0.9rem; margin-bottom: 12px; font-weight: bold; 
        }

        .action-row { 
            display: flex; justify-content: space-between; align-items: center; 
            gap: 5px; margin-bottom: 15px; 
        }

        .btn-small { 
            background: #222; border: 1px solid #ffd700; color: #ffd700; 
            padding: 6px 8px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; 
            font-weight: bold; transition: 0.2s;
        }
        .btn-small.active { background: #ffd700; color: #000; box-shadow: 0 0 10px #ffd700; }
        
        /* বেট কন্ট্রোল এরিয়া */
        .bet-area {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .bet-controls { 
            display: flex; align-items: center; gap: 5px; 
            background: #000; padding: 4px 8px; border-radius: 20px; border: 1px solid #444; 
        }
        .bet-btn { 
            width: 25px; height: 25px; border-radius: 50%; border: none; 
            background: #b8860b; color: white; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        #bet-val { color: #fff; min-width: 50px; text-align: center; font-size: 0.9rem; font-weight: bold; }

        .spin-btn { 
            width: 80px; height: 80px; background: radial-gradient(circle, #ff4500, #8b0000); 
            border: 4px solid #fff; border-radius: 50%; color: #fff; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5); 
        }
        .spin-btn:active { transform: scale(0.9); }
        .spin-btn:disabled { background: #444; filter: grayscale(1); cursor: not-allowed; }

        /* এনিমেশন: উপর থেকে নিচে */
        .spinning { animation: moveReelDown 0.12s linear infinite; }
        .turbo-spin { animation: moveReelDown 0.06s linear infinite; }

        @keyframes moveReelDown { 
            0% { transform: translateY(-75px); } 
            100% { transform: translateY(0); }   
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="slot-machine">
        <div id="r1" class="reel"></div><div id="r2" class="reel"></div><div id="r3" class="reel"></div><div id="r4" class="reel"></div><div id="r5" class="reel"></div>
    </div>

    <div class="controls">
        <div class="status-row">
            <span>WIN: <b id="win">0.00</b></span>
            <span>BAL: <b id="bal">1000.00</b></span>
        </div>

        <div class="action-row">
            <button class="btn-small" id="auto-btn">AUTO</button>
            
            <div class="bet-area">
                <div class="bet-controls">
                    <button class="bet-btn" id="bet-minus">-</button>
                    <span id="bet-val">0.50</span>
                    <button class="bet-btn" id="bet-plus">+</button>
                </div>
            </div>

            <button class="btn-small" id="turbo-btn">TURBO</button>
        </div>

        <div class="main-btn-container" style="display: flex; justify-content: center;">
            <button class="spin-btn" id="spin-trigger">Spin</button>
        </div>
    </div>
</div>

<script>
    const cards = ['A', 'K', 'Q', 'J', '10', '9'];
    const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3'), document.getElementById('r4'), document.getElementById('r5')];
    
    let balance = 1000, currentBet = 0.5, isAuto = false, isTurbo = false, isSpinning = false;

    function init() {
        reels.forEach(reel => {
            reel.innerHTML = '';
            for(let i=0; i<4; i++) {
                let div = document.createElement('div');
                div.className = 'slot-cell';
                div.innerText = cards[Math.floor(Math.random() * cards.length)];
                reel.appendChild(div);
            }
        });
    }

    // বেট কন্ট্রোল লজিক (০.৫ - ১০০০০)
    document.getElementById('bet-plus').onclick = () => {
        if(isSpinning) return;
        if(currentBet < 10) currentBet += 0.5;
        else if(currentBet < 100) currentBet += 10;
        else if(currentBet < 1000) currentBet += 50;
        
        if(currentBet > 1000) currentBet = 1000;
        updateBetDisplay();
    };

    document.getElementById('bet-minus').onclick = () => {
        if(isSpinning) return;
        if(currentBet <= 10) currentBet -= 0.5;
        else if(currentBet <= 100) currentBet -= 10;
        else if(currentBet <= 1000) currentBet -= 50;

        if(currentBet < 0.5) currentBet = 0.5;
        updateBetDisplay();
    };

    function updateBetDisplay() {
        document.getElementById('bet-val').innerText = currentBet.toFixed(2);
    }

    document.getElementById('turbo-btn').onclick = function() {
        isTurbo = !isTurbo;
        this.classList.toggle('active');
    };

    document.getElementById('auto-btn').onclick = function() {
        isAuto = !isAuto;
        this.classList.toggle('active');
        if(isAuto && !isSpinning) startSpin();
    };

    function startSpin() {
        if(balance < currentBet) { 
            isAuto = false; 
            document.getElementById('auto-btn').classList.remove('active');
            return alert("পর্যাপ্ত ব্যালেন্স নেই!"); 
        }
        
        isSpinning = true;
        balance -= currentBet;
        document.getElementById('bal').innerText = balance.toFixed(2);
        document.getElementById('spin-trigger').disabled = true;

        reels.forEach((r, i) => {
            setTimeout(() => {
                r.classList.add(isTurbo ? 'turbo-spin' : 'spinning');
            }, i * 70);
        });

        const stopTime = isTurbo ? 600 : 1600;
        
        setTimeout(() => {
            reels.forEach((r, i) => {
                setTimeout(() => {
                    r.classList.remove('spinning', 'turbo-spin');
                    r.querySelectorAll('.slot-cell').forEach(cell => {
                        cell.innerText = cards[Math.floor(Math.random() * cards.length)];
                    });
                    
                    if(i === 4) {
                        isSpinning = false;
                        document.getElementById('spin-trigger').disabled = false;
                        // এখানে আপনি উইন চেক লজিক যোগ করতে পারেন
                        if(isAuto) setTimeout(startSpin, 500);
                    }
                }, i * (isTurbo ? 50 : 150));
            });
        }, stopTime);
    }

    document.getElementById('spin-trigger').onclick = startSpin;
    init();
</script>

</body>
</html>
